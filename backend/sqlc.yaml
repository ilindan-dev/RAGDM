version: '2'

sql:
  - schema: "internal/repository/migrations/*.sql"
    queries: "queries/*.sql"
    engine: postgresql
    gen:
      go:
        package: gen
        sql_package: pgx/v5
        out: internal/repository/gen
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: uuid
            go_type:
              import: github.com/google/uuid
              type: UUID
          - db_type: timestamptz
            go_type:
              import: time
              type: Time
          - db_type: vector
            go_type:
              import: github.com/pgvector/pgvector-go
              type: Vector