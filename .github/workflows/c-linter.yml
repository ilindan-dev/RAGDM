name: C Algorithm CI

on:
  push:
    branches: [ "main", "feature/spaced-rep-algorithm" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake clang clang-format clang-tidy ninja-build

    - name: Check Formatting (clang-format)
      working-directory: ./algorithm
      run: |
        find . -name "*.c" -o -name "*.h" | xargs clang-format --dry-run --Werror

    - name: Static Analysis (clang-tidy)
      working-directory: ./algorithm
      run: |
        clang-tidy src/algorithm.c -- -I./include
        clang-tidy tests/test_algorithm.c -- -I./include

    - name: Build and Run Tests
      working-directory: ./algorithm
      run: |
        mkdir build && cd build
        cmake -G Ninja ..
        ninja
        ./test_algorithm