name: Go Lint

on:
  pull_request:
    branches: [ "dev", "main" ]
    paths:
      - 'backend/**'

jobs:
  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'backend/go.mod'
          check-latest: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: ./backend