<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Тренажёр - RAGDM</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Тренажёр</h1>
    </header>

    <main>
      <div class="card">
        <div id="question-container">
          <div class="question-card">
            <div class="question-label">Вопрос системы</div>
            <div id="question-text" class="question-text">Загрузка вопроса...</div>
          </div>
        </div>

        <form id="answer-form">
          <div class="input-block">
            <textarea id="answer-input" placeholder="Введите ваш ответ..." rows="3"></textarea>
            <button type="submit">Проверить</button>
          </div>
        </form>

        <div id="feedback"></div>

        <div class="trainer-actions">
          <button type="button" id="next-question-btn">Следующий вопрос</button>
        </div>
      </div>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script>
    const questionContainer = document.getElementById('question-container');
    const answerForm = document.getElementById('answer-form');
    const answerInput = document.getElementById('answer-input');
    const nextQuestionBtn = document.getElementById('next-question-btn');
    const feedbackDiv = document.getElementById('feedback');
    const questionText = document.getElementById('question-text');
    
    let currentQuestion = null;

    async function loadNextQuestion() {
      if (questionContainer) {
        questionContainer.style.opacity = '0.5';
      }
      
      if (feedbackDiv) {
        feedbackDiv.innerHTML = '';
      }
      
      if (answerInput) {
        answerInput.value = '';
        answerInput.disabled = true;
      }

      try {
        currentQuestion = await getNextQuestion();
        
        if (currentQuestion && questionText) {
          questionText.textContent = currentQuestion.question_text || currentQuestion.text;
          
          if (answerInput) {
            answerInput.disabled = false;
            answerInput.focus();
          }
        }
      } catch (error) {
        console.error('Failed to load question:', error);
        if (questionText) {
          questionText.textContent = error.message === 'Нет карточек для повторения' 
            ? 'Поздравляем! Все карточки повторены.' 
            : 'Ошибка загрузки вопроса. Попробуйте позже.';
        }
        if (answerInput) {
          answerInput.disabled = true;
        }
        currentQuestion = null;
      } finally {
        if (questionContainer) {
          questionContainer.style.opacity = '1';
        }
      }
    }

    async function handleSubmitAnswer(event) {
      event.preventDefault();
      
      if (!currentQuestion) {
        alert('Нет активного вопроса. Загрузите следующий вопрос.');
        return;
      }
      
      const answer = answerInput ? answerInput.value.trim() : '';
      if (!answer) {
        alert('Пожалуйста, введите ответ');
        return;
      }
      
      const submitBtn = answerForm.querySelector('button[type="submit"]');
      if (submitBtn) {
        submitBtn.disabled = true;
      }
      
      try {
        const result = await submitAnswer(currentQuestion.id, answer);
        
        if (feedbackDiv) {
          const isCorrect = result.is_correct || result.correct;
          feedbackDiv.innerHTML = `
            <div class="feedback ${isCorrect ? 'correct' : 'incorrect'}">
              <strong>${isCorrect ? 'Верно!' : 'Неверно!'}</strong>
              <p>${result.message || (isCorrect ? 'Отличная работа!' : `Правильный ответ: ${result.correct_answer || 'не указан'}`)}</p>
            </div>
          `;
        }
        
        setTimeout(() => {
          loadNextQuestion();
        }, 2000);
        
      } catch (error) {
        console.error('Failed to submit answer:', error);
        if (feedbackDiv) {
          feedbackDiv.innerHTML = '<div class="error">Ошибка отправки ответа. Попробуйте еще раз.</div>';
        }
      } finally {
        if (submitBtn) {
          submitBtn.disabled = false;
        }
      }
    }

    if (answerForm) {
      answerForm.addEventListener('submit', handleSubmitAnswer);
    }
    
    if (nextQuestionBtn) {
      nextQuestionBtn.addEventListener('click', loadNextQuestion);
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      loadNextQuestion();
    });
  </script>
</body>
</html>
