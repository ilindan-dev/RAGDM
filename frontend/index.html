<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAGDM</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>RAG по дискретной математике</h1>
      <p class="subtitle">Локальный сервис поиска и тренировки</p>
    </header>

    <nav class="tabs">
      <button class="tab-button active" data-tab="search">Поиск по учебнику</button>
      <button class="tab-button" data-tab="trainer">Тренажёр</button>
    </nav>

    <main>
      <!-- SEARCH -->
      <section id="search-tab" class="tab-content active">
        <div class="card">
          <h2>Сервис поиска</h2>

          <div id="chat" class="chat"></div>

          <div id="loader" class="loader hidden">Поиск...</div>

          <div class="input-block">
            <textarea id="input" placeholder="Введите вопрос..."></textarea>
            <button id="send">Отправить</button>
          </div>
        </div>
      </section>

      <!-- TRAINER -->
      <section id="trainer-tab" class="tab-content">
        <div class="card">
          <h2>Тренажёр</h2>

          <div class="question-card">
            <div class="question-label">Вопрос системы</div>
            <div id="trainer-question" class="question-text">
              Что называется полным графом?
            </div>
          </div>

          <div class="input-block">
            <textarea
              id="trainer-answer"
              placeholder="Введите ваш ответ..."
            ></textarea>
            <button id="check-answer-btn">Проверить</button>
          </div>

          <div id="trainer-result" class="result-block hidden">
            <div id="result-status" class="result-status result-status-partial">
              Частично верно
            </div>

            <div class="result-percent">
              Процент совпадения: <span id="result-percent">0%</span>
            </div>

            <div class="result-explanation-title">Пояснение</div>
            <div id="result-explanation" class="result-explanation"></div>
          </div>

          <div class="trainer-actions">
            <button id="next-question-btn">Далее</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
