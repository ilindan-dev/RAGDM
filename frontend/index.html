<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAGDM</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>RAG по дискретной математике</h1>
      <p class="subtitle">Локальный сервис поиска и тренировки</p>
    </header>

    <nav class="tabs">
      <button class="tab-button active" data-tab="search">Поиск по учебнику</button>
      <button class="tab-button" data-tab="trainer">Тренажёр</button>
    </nav>

    <main>
      <!-- SEARCH -->
      <section id="search-tab" class="tab-content active">
        <div class="card">
          <h2>Сервис поиска</h2>

          <form id="search-form">
            <div class="input-block">
              <input 
                type="text" 
                id="search-input" 
                placeholder="Введите поисковый запрос..."
                class="search-input"
              />
              <button type="submit" id="search-btn">Найти</button>
            </div>
          </form>

          <div id="loading-indicator" class="loader hidden">Поиск...</div>
          <div id="search-results" class="search-results"></div>
        </div>
      </section>
          

      <!-- TRAINER -->
      <section id="trainer-tab" class="tab-content">
        <div class="card">
          <h2>Тренажёр</h2>

          <div class="question-card">
            <div class="question-label">Вопрос системы</div>
            <div id="question-text" class="question-text">
              Загрузка вопроса...
            </div>
          </div>
        </div>

        <form id="answer-form">
          <div class="input-block">
            <textarea
              id="answer-input"
              placeholder="Введите ваш ответ..."
              rows="3"
            ></textarea>
            <button type="submit" id="submit-answer-btn">Проверить</button>
          </div>
        </form>
        
        <div id="feedback" class="feedback-block"></div>

          <div class="trainer-actions">
            <button type="button" id="next-question-btn">Следующий вопрос</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
