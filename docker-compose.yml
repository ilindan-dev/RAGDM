services:
  # Database Service (PostgreSQL + pgvector)
  db:
    image: pgvector/pgvector:pg16
    container_name: ragdm_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ragdm}
    ports:
      - ${DB_PORT:-5432}:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ragdm}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend Service (Go + CGO + ONNX)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ragdm_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8080}:${HTTP_PORT:-8080}"
    environment:
      - HTTP_PORT=${HTTP_PORT:-8080}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - GIN_MODE=${GIN_MODE:-debug}
      - API_TIMEOUT=${API_TIMEOUT:-5s}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:${DB_PORT:-5432}/${DB_NAME:-ragdm}?sslmode=disable
      - DB_MAX_CONNS=${DB_MAX_CONNS:-20}
      - DB_MIN_CONNS=${DB_MIN_CONNS:-5}
      - TOKENIZER_PATH=${TOKENIZER_PATH}
      - ONNX_MODEL_PATH=${ONNX_MODEL_PATH}
      - ONNX_LIBRARY_PATH=${ONNX_LIBRARY_PATH}
    volumes:
      # Mount ML models from host to container to avoid bloating the image
      - ./models:/app/models
      - ./parser/seed_cards.sql:/app/seed_cards.sql:ro

volumes:
  pgdata: